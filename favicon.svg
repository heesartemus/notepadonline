<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8572A"/>
      <stop offset="100%" style="stop-color:#F07A4F"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Page shape -->
  <rect x="136" y="80" width="260" height="340" rx="18" fill="white" opacity="0.95"/>
  <!-- Lines on the page -->
  <rect x="176" y="148" width="180" height="8" rx="4" fill="#E8572A" opacity="0.35"/>
  <rect x="176" y="180" width="150" height="8" rx="4" fill="#E8572A" opacity="0.25"/>
  <rect x="176" y="212" width="170" height="8" rx="4" fill="#E8572A" opacity="0.2"/>
  <rect x="176" y="244" width="120" height="8" rx="4" fill="#E8572A" opacity="0.15"/>
  <!-- Pencil -->
  <g transform="translate(300, 290) rotate(35)">
    <rect x="0" y="0" width="16" height="140" rx="3" fill="#F5C842"/>
    <polygon points="3,140 13,140 8,162" fill="#FFE0A0"/>
    <polygon points="5,155 11,155 8,166" fill="#333"/>
    <rect x="0" y="0" width="16" height="18" rx="3" fill="#E8572A"/>
  </g>
  <!-- Letter N -->
  <text x="168" y="136" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="52" fill="#E8572A">N</text>
</svg>
