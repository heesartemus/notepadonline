<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Notepad Online</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #FAF9F7;
            color: #1A1A1A;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .container { max-width: 480px; }
        .code {
            font-size: 120px;
            font-weight: 800;
            letter-spacing: -6px;
            color: #E8572A;
            line-height: 1;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 16px;
            color: #7A7A7A;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        a.btn {
            display: inline-block;
            padding: 14px 32px;
            background: #E8572A;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s;
        }
        a.btn:hover { background: #D04A20; }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1>Page not found</h1>
        <p>The page you're looking for doesn't exist or has been moved. No worries — your notepad is still waiting for you.</p>
        <a href="/" class="btn">Back to Notepad Online</a>
    </div>
</body>
</html>
